version: "3.9"

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - ./backend:/app
    - media_tmp:/tmp/wmsg_uploads
  networks:
    - wmsg_net

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wmsg
      POSTGRES_USER: wmsg
      POSTGRES_PASSWORD: wmsg_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmsg -d wmsg"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wmsg_net

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wmsg_net

  # ─────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────
  backend:
    <<: *backend-common
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Celery Workers
  # ─────────────────────────────────────────
  celery_webhook:
    <<: *backend-common
    command: python -m celery -A app.celery_app worker -Q webhook_queue -c 4 --loglevel=info -n webhook@%h
    restart: unless-stopped

  celery_message:
    <<: *backend-common
    command: python -m celery -A app.celery_app worker -Q message_queue -c 4 --loglevel=info -n message@%h
    restart: unless-stopped

  celery_campaign:
    <<: *backend-common
    command: python -m celery -A app.celery_app worker -Q campaign_queue -c 2 --loglevel=info -n campaign@%h
    restart: unless-stopped

  celery_billing:
    <<: *backend-common
    command: python -m celery -A app.celery_app worker -Q billing_queue -c 1 --prefetch-multiplier=1 --loglevel=info -n billing@%h
    restart: unless-stopped

  celery_media:
    <<: *backend-common
    command: python -m celery -A app.celery_app worker -Q media_queue -c 2 --loglevel=info -n media@%h
    restart: unless-stopped

  celery_beat:
    <<: *backend-common
    command: python -m celery -A app.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Monitoring
  # ─────────────────────────────────────────
  flower:
    <<: *backend-common
    command: python -m celery -A app.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - wmsg_net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    networks:
      - wmsg_net

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16687:16686"
    networks:
      - wmsg_net

  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    networks:
      - wmsg_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Nginx (Gateway)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - wmsg_net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  media_tmp:
  prometheus_data:
  grafana_data:

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  wmsg_net:
    driver: bridge